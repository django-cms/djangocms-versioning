name: Ruff

on:
  push:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39

    - name: Install ruff
      run: uv tool install ruff

    - name: Run ruff
      run: uvx ruff check --output-format=github djangocms_versioning tests
